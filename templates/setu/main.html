<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        #main {
            width: 800px;
            justify-content: center;
            align-items: center;
            display: flex;
        }

        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 1;
        }

        .image-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            position: relative;
        }

        .image-card:nth-child(odd) { transform: rotate(0.3deg); }
        .image-card:nth-child(even) { transform: rotate(-0.3deg); }

        .safe-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            filter: contrast(1.02) brightness(1.01) sepia(0.03);
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.08;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 10;
            border-radius: 8px;
        }

        .footer-hash {
            text-align: center;
            color: #ccc;
            font-size: 10px;
            margin-top: 20px;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div id="main">
    <div class="noise-overlay"></div>

    <div class="container">
        {% for item in items %}
        <div class="image-card">
            <div class="grid-overlay"></div>
            <img src="{{ item.image }}" class="safe-img" alt="img{{ loop.index }}" loading="eager">
        </div>
        {% endfor %}

        <div class="footer-hash" id="uniqueHash"></div>
    </div>

    <script>
        document.getElementById('uniqueHash').textContent =
            `UID: ${Math.random().toString(36).substring(2, 15)} - ${new Date().toISOString()}`;
    </script>
</div>
</body>
</html>
